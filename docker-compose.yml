version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    restart: always
    volumes:
      - ./docker-volumes/postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crm-redis
    restart: always
    volumes:
      - ./docker-volumes/redis_data:/data
    networks:
      - crm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  twenty:
    image: twentycrm/twenty:latest
    container_name: crm-server
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crm-network

  vllm:
    image: vllm/vllm-openai:latest
    container_name: llm-inference-vllm
    profiles:
      - gpu-server
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./docker-volumes/vllm_cache:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --model ${AI_MODEL_NAME:-google/gemma-4-E4B-it}
      --max-model-len 8192
      --gpu-memory-utilization 0.90
    networks:
      - crm-network

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui-client
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./docker-volumes/open-webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=${AI_INFERENCE_URL:-http://host.docker.internal:11434}
      - OPENAI_API_BASE_URL=http://vllm:8000/v1
      - WEBUI_SECRET_KEY=${JWT_SECRET}
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge